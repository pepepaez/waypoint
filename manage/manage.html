<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Waypoint — Manage Bookmarks</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="manage.css">
</head>
<body>
  <div id="app">
    <header class="manage-header">
      <h1 class="manage-title">Waypoint</h1>
      <div class="manage-header-actions">
        <div class="manage-search-wrap">
          <input type="text" class="manage-search" id="search-input" placeholder="Search bookmarks...">
          <button class="manage-search-clear" id="search-clear">&times;</button>
        </div>
      </div>
    </header>

    <div class="manage-body">
      <!-- Tag sidebar -->
      <aside class="tag-sidebar" id="tag-sidebar">
        <div class="tag-sidebar-header">
          <span class="tag-sidebar-title">Tags</span>
          <span class="tag-sidebar-count" id="tag-total-count"></span>
        </div>
        <div class="tag-sidebar-list" id="tag-list"></div>
      </aside>

      <!-- Main content -->
      <main class="manage-main">
        <div class="manage-toolbar">
          <div class="manage-toolbar-left">
            <label class="manage-select-all-label">
              <input type="checkbox" id="select-all">
              <span id="selection-count">0 selected</span>
            </label>
          </div>
          <div class="manage-toolbar-center">
            <select class="manage-sort-select" id="sort-select">
              <option value="recent-desc">Recent (newest)</option>
              <option value="recent-asc">Recent (oldest)</option>
              <option value="name-asc">Name (A-Z)</option>
              <option value="name-desc">Name (Z-A)</option>
            </select>
          </div>
        <div class="manage-toolbar-right">
            <button class="manage-btn" id="btn-add-tag" disabled>+ Tag</button>
            <button class="manage-btn" id="btn-remove-tag" disabled>- Tag</button>
            <button class="manage-btn manage-btn-danger" id="btn-delete" disabled>Delete</button>
            <span class="manage-separator"></span>
            <button class="manage-btn manage-btn-danger" id="btn-delete-all">Delete All</button>
            <button class="manage-btn" id="btn-export">Export</button>
            <button class="manage-btn" id="btn-import-json">Import JSON</button>
            <button class="manage-btn" id="btn-import-chrome">Import Chrome</button>
            <input type="file" id="file-import" accept=".json" hidden>
            <button class="manage-btn" id="btn-refresh-favicons">Refresh Favicons</button>
          </div>
        </div>
        <div class="manage-list" id="bookmark-list"></div>
      </main>
    </div>

    <!-- Settings -->
    <div class="manage-settings" id="settings-section">
      <div class="manage-settings-header">
        <h2 class="manage-settings-title">Settings</h2>
      </div>
      <div class="manage-settings-row">
        <span class="manage-settings-label">Theme</span>
        <div class="theme-picker" id="theme-picker"></div>
      </div>
    </div>
  </div>

  <!-- Tag input dialog -->
  <div class="manage-overlay" id="tag-dialog" style="display:none">
    <div class="manage-dialog">
      <p class="manage-dialog-title" id="tag-dialog-title">Add tag</p>
      <input type="text" class="manage-dialog-input" id="tag-dialog-input" placeholder="Tag name...">
      <div class="manage-dialog-actions">
        <button class="manage-btn" id="tag-dialog-cancel">Cancel</button>
        <button class="manage-btn manage-btn-primary" id="tag-dialog-confirm">Apply</button>
      </div>
    </div>
  </div>

  <!-- Remove tag picker dialog -->
  <div class="manage-overlay" id="remove-tag-dialog" style="display:none">
    <div class="manage-dialog">
      <p class="manage-dialog-title">Remove tags</p>
      <p class="manage-dialog-subtitle" id="remove-tag-subtitle"></p>
      <div class="remove-tag-list" id="remove-tag-list"></div>
      <div class="manage-dialog-actions">
        <button class="manage-btn" id="remove-tag-done">Done</button>
      </div>
    </div>
  </div>

  <!-- Speed dial picker dialog -->
  <div class="manage-overlay" id="speeddial-dialog" style="display:none">
    <div class="manage-dialog manage-dialog-wide">
      <p class="manage-dialog-title">Set Speed Dial Slot</p>
      <p class="manage-dialog-subtitle" id="speeddial-dialog-subtitle"></p>
      <div class="speeddial-slot-grid" id="speeddial-slot-grid"></div>
      <div class="manage-dialog-actions">
        <button class="manage-btn" id="speeddial-dialog-cancel">Cancel</button>
        <button class="manage-btn manage-btn-danger" id="speeddial-dialog-remove">Remove from Speed Dial</button>
      </div>
    </div>
  </div>

  <!-- Rename dialog -->
  <div class="manage-overlay" id="rename-dialog" style="display:none">
    <div class="manage-dialog">
      <p class="manage-dialog-title">Rename Bookmark</p>
      <div class="manage-dialog-field">
        <label class="manage-dialog-label">Title</label>
        <input type="text" class="manage-dialog-input" id="rename-title-input" placeholder="Title...">
      </div>
      <div class="manage-dialog-field">
        <label class="manage-dialog-label">URL</label>
        <input type="text" class="manage-dialog-input" id="rename-url-input" placeholder="https://...">
      </div>
      <div class="manage-dialog-actions">
        <button class="manage-btn" id="rename-dialog-cancel">Cancel</button>
        <button class="manage-btn manage-btn-primary" id="rename-dialog-confirm">Save</button>
      </div>
    </div>
  </div>

  <!-- Confirm dialog -->
  <div class="manage-overlay" id="confirm-dialog" style="display:none">
    <div class="manage-dialog">
      <p class="manage-dialog-title" id="confirm-dialog-title">Are you sure?</p>
      <p class="manage-dialog-subtitle" id="confirm-dialog-subtitle"></p>
      <div class="manage-dialog-actions">
        <button class="manage-btn" id="confirm-dialog-cancel">Cancel</button>
        <button class="manage-btn manage-btn-danger" id="confirm-dialog-confirm">Delete</button>
      </div>
    </div>
  </div>

  <script type="module" src="manage.js"></script>
</body>
</html>
